org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m
android.useAndroidX=true
android.enableJetifier=true
expo.webapp.useLegacyFonts=true

# React Native / Hermes properties
hermesEnabled=true
newArchEnabled=false
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# Disable foojay resolver which causes issues in some environments
org.gradle.toolchains.foojay-resolver-convention=false
android.kotlinVersion=1.9.24
kotlinVersion=1.9.24
EX_DEV_CLIENT_NETWORK_INSPECTOR=true
expo.useLegacyPackaging=false
android.extraMavenRepos=[]