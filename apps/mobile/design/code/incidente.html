<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2563eb",
                        "background-light": "#f5f5f5",
                        "background-dark": "#111621",
                        "severity-low": "#10b981",
                        "severity-medium": "#f59e0b",
                        "severity-high": "#ef4444",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display">
<!-- Mobile Screen Container -->
<div class="relative flex h-screen w-full max-w-[480px] mx-auto flex-col bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl">
<!-- App Background Overlay (Simulating the screen behind the bottom sheet) -->
<div class="flex-1 p-6 opacity-40">
<div class="flex items-center gap-4 mb-8">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">local_shipping</span>
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Frota2026 Driver</h2>
</div>
<div class="space-y-4">
<div class="h-32 w-full bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-12 w-full bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
<div class="h-12 w-full bg-slate-200 dark:bg-slate-800 rounded-xl"></div>
</div>
</div>
<!-- Bottom Sheet Modal Backdrop -->
<div class="absolute inset-0 bg-black/40 z-10"></div>
<!-- Bottom Sheet -->
<div class="absolute bottom-0 left-0 right-0 z-20 flex flex-col items-stretch bg-white dark:bg-slate-900 rounded-t-[2rem] shadow-[0_-8px_30px_rgb(0,0,0,0.12)]">
<!-- BottomSheetHandle -->
<button class="flex h-6 w-full items-center justify-center pt-2">
<div class="h-1.5 w-12 rounded-full bg-slate-300 dark:bg-slate-700"></div>
</button>
<div class="flex-1 overflow-y-auto px-6 pt-4 pb-24">
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight tracking-tight text-center mb-6">Relatar Incidente</h1>
<!-- Severity Selection -->
<div class="mb-6">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-semibold mb-3">Gravidade</h3>
<div class="flex gap-3">
<!-- Low Severity -->
<div class="flex-1 flex h-11 items-center justify-center gap-x-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="w-2.5 h-2.5 rounded-full bg-severity-low"></span>
<p class="text-sm font-semibold">Baixa</p>
</div>
<!-- Medium Severity (Selected) -->
<div class="flex-1 flex h-11 items-center justify-center gap-x-2 rounded-xl border-2 border-severity-medium bg-severity-medium/10 text-severity-medium">
<span class="w-2.5 h-2.5 rounded-full bg-severity-medium"></span>
<p class="text-sm font-bold">Média</p>
</div>
<!-- High Severity -->
<div class="flex-1 flex h-11 items-center justify-center gap-x-2 rounded-xl border-2 border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-400">
<span class="w-2.5 h-2.5 rounded-full bg-severity-high"></span>
<p class="text-sm font-semibold">Alta</p>
</div>
</div>
</div>
<!-- Description Field -->
<div class="mb-6">
<label class="flex flex-col w-full">
<p class="text-slate-900 dark:text-slate-100 text-base font-semibold pb-2">Descrição do Incidente</p>
<textarea class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-xl text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 min-h-[140px] placeholder:text-slate-400 p-4 text-base font-normal leading-relaxed" placeholder="Ex: Pneu furado, barulho no motor..."></textarea>
</label>
</div>
<!-- Camera Upload Area -->
<div class="mb-6">
<button class="w-full flex flex-col items-center justify-center py-8 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl bg-slate-50/50 dark:bg-slate-800/50 hover:bg-slate-100 transition-colors">
<span class="material-symbols-outlined text-4xl text-slate-400 mb-2">photo_camera</span>
<span class="text-slate-600 dark:text-slate-400 font-medium">Tirar Foto (Opcional)</span>
</button>
</div>
</div>
<!-- Fixed Footer Buttons -->
<div class="absolute bottom-0 left-0 right-0 p-6 bg-white dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 flex gap-4">
<button class="flex-1 h-14 rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 font-bold text-base hover:bg-slate-200 transition-colors">
                    Cancelar
                </button>
<button class="flex-1 h-14 rounded-xl bg-severity-medium text-white font-bold text-base shadow-lg shadow-severity-medium/30 hover:bg-amber-600 transition-colors">
                    Relatar
                </button>
</div>
</div>
</div>
</body></html>
