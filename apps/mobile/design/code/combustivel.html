<!DOCTYPE html>

<html lang="pt-br"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<!-- App Background Mockup -->
<div class="fixed inset-0 z-0 flex flex-col">
<header class="p-4 flex items-center justify-between bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary flex items-center justify-center text-white">
<span class="material-symbols-outlined">local_shipping</span>
</div>
<div>
<h1 class="text-sm font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider">Frota2026 Driver</h1>
<p class="text-xs text-slate-500 dark:text-slate-400">Placa: ABC-1234 • Scania R450</p>
</div>
</div>
<button class="size-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<main class="flex-1 p-4">
<div class="grid grid-cols-2 gap-4">
<div class="p-4 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<span class="material-symbols-outlined text-primary mb-2">speed</span>
<p class="text-xs text-slate-500">KM Total</p>
<p class="text-lg font-bold text-slate-900 dark:text-slate-100">42.580</p>
</div>
<div class="p-4 bg-white dark:bg-slate-900 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<span class="material-symbols-outlined text-green-500 mb-2">ev_station</span>
<p class="text-xs text-slate-500">Média (km/l)</p>
<p class="text-lg font-bold text-slate-900 dark:text-slate-100">3,8</p>
</div>
</div>
</main>
</div>
<!-- Bottom Sheet Modal Container -->
<div class="fixed inset-0 z-50 flex flex-col justify-end bg-slate-900/60 backdrop-blur-sm">
<!-- Bottom Sheet Content -->
<div class="w-full bg-white dark:bg-slate-900 rounded-t-[2rem] shadow-2xl flex flex-col animate-in slide-in-from-bottom duration-300 max-h-[95vh]">
<!-- Handle -->
<div class="flex h-6 w-full items-center justify-center sticky top-0 bg-white dark:bg-slate-900 z-10">
<div class="h-1.5 w-12 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Header -->
<div class="flex items-center justify-between px-6 py-4 border-b border-slate-100 dark:border-slate-800">
<h2 class="text-xl font-bold text-slate-900 dark:text-slate-100">Registrar Abastecimento</h2>
<button class="size-10 rounded-full flex items-center justify-center text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Form Content -->
<div class="p-6 space-y-6 overflow-y-auto flex-1">
<!-- Numeric Inputs -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">KM Atual</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">speed</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-lg font-medium" placeholder="0.000" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Litros</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">local_gas_station</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-lg font-medium" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Valor Total (R$)</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400">payments</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none text-lg font-medium" placeholder="0,00" step="0.01" type="number"/>
</div>
</div>
</div>
<!-- Fuel Type Select -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Tipo de Combustível</label>
<div class="flex flex-wrap gap-2">
<button class="px-5 py-2.5 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Gasolina</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Etanol</button>
<button class="px-5 py-2.5 rounded-full bg-primary text-white text-sm font-bold shadow-md shadow-primary/30 ring-2 ring-primary ring-offset-2 dark:ring-offset-slate-900">Diesel</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">GNV</button>
<button class="px-5 py-2.5 rounded-full border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Outro</button>
</div>
</div>
<!-- Payment Method Select -->
<div class="space-y-3">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Forma de Pagamento</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900">Dinheiro</button>
<button class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900">Pix</button>
<button class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900">Débito</button>
<button class="px-4 py-2 rounded-lg border border-primary text-primary bg-primary/5 text-sm font-bold">Crédito</button>
<button class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900">Cartão Comb.</button>
<button class="px-4 py-2 rounded-lg border border-slate-200 dark:border-slate-700 text-sm font-medium text-slate-600 dark:text-slate-400 bg-white dark:bg-slate-900">Faturado</button>
</div>
</div>
<!-- Photo/Observation (Optional add-on) -->
<div class="pt-2">
<button class="w-full h-14 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-xl flex items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">add_a_photo</span>
<span class="text-sm font-medium">Anexar Cupom Fiscal (Opcional)</span>
</button>
</div>
</div><!-- Footer Buttons -->
<div class="p-6 border-t border-slate-100 dark:border-slate-800 bg-white dark:bg-slate-900 flex gap-4">
<button class="flex-1 h-14 rounded-xl border border-slate-300 dark:border-slate-700 text-slate-600 dark:text-slate-300 font-bold hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    Cancelar
                </button>
<button class="flex-[2] h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/25 hover:brightness-110 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
                    Salvar Registro
                </button>
</div>
<!-- Safe Area Spacer (Mobile) -->
<div class="h-8 bg-white dark:bg-slate-900"></div>
<!-- Footer Buttons -->
<!-- Safe Area Spacer (Mobile) -->
</div>
</div>
</body></html>
