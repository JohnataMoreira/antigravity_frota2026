services:
  # -----------------------------------------------------------------------------
  # DATABASE (PostgreSQL)
  # -----------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: frota2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - frota-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------------------
  # OBJECT STORAGE (MinIO)
  # -----------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    networks:
      - frota-network

  # -----------------------------------------------------------------------------
  # BACKEND API (NestJS)
  # -----------------------------------------------------------------------------
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:${DB_PASSWORD}@postgres:5432/frota2026?schema=public"
      JWT_SECRET: "${JWT_SECRET}"
      PORT: 3000
      # Storage Configuration
      STORAGE_ENDPOINT: "http://minio:9000" # Internal Docker Network
      STORAGE_BUCKET: "frota-uploads"
      STORAGE_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "${MINIO_ROOT_USER}"
      AWS_SECRET_ACCESS_KEY: "${MINIO_ROOT_PASSWORD}"
      AWS_S3_FORCE_PATH_STYLE: "true"
    networks:
      - frota-network
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'
        reservations:
          memory: 256M
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -----------------------------------------------------------------------------
  # FRONTEND WEB (React/Vite)
  # -----------------------------------------------------------------------------
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    environment:
      # Vite uses VITE_ prefix, but mapping NEXT_PUBLIC for compatibility if requested
      VITE_API_URL: "https://frota.johnatamoreira.com.br/api"
      NEXT_PUBLIC_API_URL: "https://frota.johnatamoreira.com.br/api"
    networks:
      - frota-network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:80 || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3

# -----------------------------------------------------------------------------
# NETWORKS & VOLUMES
# -----------------------------------------------------------------------------
networks:
  frota-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
