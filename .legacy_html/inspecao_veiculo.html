<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f5f5f5",
                        "background-dark": "#111621",
                        "success": "#16a34a",
                        "danger": "#dc2626",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Frota2026 Driver - Inspeção</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Header -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 px-4 py-4 sticky top-0 z-10 shadow-sm">
<div class="flex items-center justify-between">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Frota2026 Driver</h1>
<div class="w-10"></div> <!-- Spacer for centering title -->
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col p-4 max-w-md mx-auto w-full gap-4">
<!-- Progress and Title Section -->
<section class="bg-white dark:bg-slate-900 p-5 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<div class="flex justify-between items-end mb-3">
<h2 class="text-primary text-xl font-bold">Frente do Veículo</h2>
<span class="text-slate-500 dark:text-slate-400 font-medium">Etapa 1 de 6</span>
</div>
<div class="w-full bg-slate-200 dark:bg-slate-700 h-3 rounded-full overflow-hidden">
<div class="bg-primary h-full w-1/6 rounded-full"></div>
</div>
</section>
<!-- Camera Viewfinder Section (approx 50% screen height goal) -->
<section class="flex-1 min-h-[55vh] bg-white dark:bg-slate-900 rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center p-6 text-center relative overflow-hidden shadow-inner group cursor-pointer">
<div class="absolute inset-0 bg-slate-100 dark:bg-slate-800/50 flex items-center justify-center">
<!-- Placeholder for actual camera feed -->
<div class="flex flex-col items-center gap-4"><div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mb-2">
<span class="material-symbols-outlined text-primary text-5xl">photo_camera</span>
</div>
<div>
<p class="text-lg font-bold text-slate-800 dark:text-slate-200">Capturar Foto</p>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-1 px-4 mb-4">Enquadre a parte frontal do caminhão certificando-se de que a placa esteja visível.</p>
</div>
<button class="bg-primary hover:bg-primary/90 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined">camera</span>
  ABRIR CÂMERA
</button></div>
</div>
<!-- Mock visual corner guides for the camera -->
<div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-lg"></div>
<div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-lg"></div>
</section><div class="flex flex-col items-center justify-center py-2">
<div class="w-[100px] h-[100px] bg-slate-200 dark:bg-slate-800 rounded-lg border-2 border-slate-300 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-sm">
<span class="material-symbols-outlined text-slate-400 text-3xl">image</span>
</div>
<p class="text-[10px] text-slate-500 mt-1 uppercase tracking-wider font-bold">Pré-visualização</p>
</div>
<!-- Action Buttons Section -->
<section class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center gap-2 bg-success text-white py-4 rounded-xl shadow-md font-bold text-lg min-h-[72px] hover:brightness-110 active:scale-95 transition-all">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl font-bold">check_circle</span>
<span>OK</span>
</div>
<span class="text-xs font-normal opacity-90">Tudo em ordem</span>
</button>
<button class="flex flex-col items-center justify-center gap-2 bg-danger text-white py-4 rounded-xl shadow-md font-bold text-lg min-h-[72px] hover:brightness-110 active:scale-95 transition-all">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-2xl font-bold">report_problem</span>
<span>PROBLEMA</span>
</div>
<span class="text-xs font-normal opacity-90">Relatar avaria</span>
</button>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
<div class="flex justify-around items-center px-2 py-3">
<a class="flex flex-col items-center gap-1 group w-20" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">air_freshener</span>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 group-hover:text-primary">Veículos</span>
</a>
<a class="flex flex-col items-center gap-1 group w-20 relative" href="#">
<div class="absolute -top-1 w-12 h-1 bg-primary rounded-full"></div>
<span class="material-symbols-outlined text-primary fill-[1]">steering_wheel_heat</span>
<span class="text-[10px] font-bold text-primary">Jornada</span>
</a>
<a class="flex flex-col items-center gap-1 group w-20" href="#">
<span class="material-symbols-outlined text-slate-400 dark:text-slate-500 group-hover:text-primary transition-colors">person</span>
<span class="text-[10px] font-medium text-slate-500 dark:text-slate-400 group-hover:text-primary">Perfil</span>
</a>
</div>
</nav>
<!-- Additional padding for iOS safe areas if needed -->
<div class="h-4 bg-white dark:bg-slate-900"></div>
</body></html>
