<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f6f6f8",
                        "background-dark": "#111621",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display antialiased">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[480px] space-y-8">
<div class="flex flex-col items-center space-y-6">
<div class="w-full aspect-[3/1] bg-slate-200 dark:bg-slate-800 rounded-lg flex items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-700" data-alt="Placeholder rectangular space for company logo">
<span class="text-slate-500 dark:text-slate-400 font-medium">Logo da Empresa</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-3xl font-bold leading-tight text-center">
                    Frota2026 Driver
                </h1>
</div>
<form class="space-y-5" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-2">
<label for="organization_cnpj" class="text-slate-700 dark:text-slate-300 text-base font-medium leading-normal">
                        CNPJ da Organização
                    </label>
<input id="organization_cnpj" class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal" placeholder="00.000.000/0000-00" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label for="email" class="text-slate-700 dark:text-slate-300 text-base font-medium leading-normal">
                        E-mail
                    </label>
<input id="email" class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 text-base font-normal" placeholder="seu@email.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label for="password" class="text-slate-700 dark:text-slate-300 text-base font-medium leading-normal">
                        Senha
                    </label>
<div class="relative flex w-full items-center">
<input id="password" class="form-input flex w-full rounded-lg text-slate-900 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900 h-14 placeholder:text-slate-400 dark:placeholder:text-slate-500 px-4 pr-12 text-base font-normal" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="pt-4">
<button class="flex w-full min-h-[56px] items-center justify-center rounded-xl bg-primary px-4 py-3 text-lg font-semibold text-white shadow-lg shadow-primary/20 hover:bg-primary/90 active:scale-[0.98] transition-all" type="submit">
                        Entrar
                    </button>
</div>
</form>
<div class="pt-8 text-center">
<p class="text-slate-500 dark:text-slate-400 text-sm">
                    Problemas para acessar? <a class="text-primary font-medium hover:underline" href="#">Contate seu gestor.</a>
</p>
</div>
</div>
</div>
</body></html>
